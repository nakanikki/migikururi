<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b2f3a"/>
      <stop offset="1" stop-color="#15151c"/>
    </linearGradient>
    <!-- 「口」の内側だけパイを見せるクリップ（口の内側） -->
    <clipPath id="kuchi">
      <rect x="392" y="556" width="372" height="356" rx="6"/>
    </clipPath>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="url(#bg)"/>

  <!-- 「右」をキャンバスいっぱい・中央に。白の極太ストローク。
       1) 払い（ノ）  2) 横画（一）  3) 口 -->
  <g fill="#f4f4f8">
    <!-- 払い（ノ）: 上中央右 → 左下。太く長く。 -->
    <path d="M 600 70 L 250 760 L 348 808 L 700 120 Z"/>
    <!-- 横画（一）: 左端から右へ、画面幅いっぱい近く。 -->
    <rect x="190" y="250" width="660" height="92" rx="14"/>
  </g>

  <!-- 「口」: 白枠＋内側カラフルパイ。中央下に大きく。 -->
  <rect x="368" y="532" width="420" height="404" rx="18" fill="#f4f4f8"/>
  <g clip-path="url(#kuchi)">
    <g transform="translate(578,734)">
      <!-- 中心(578,734)・外半径270・内半径92。4分割ムーテッド配色 -->
      <path d="M 0 -270 A 270 270 0 0 1 190.92 -190.92 L 65.05 -65.05 A 92 92 0 0 0 0 -92 Z" fill="#6b8aa6"/>
      <path d="M 190.92 -190.92 A 270 270 0 0 1 190.92 190.92 L 65.05 65.05 A 92 92 0 0 0 65.05 -65.05 Z" fill="#c9a26b"/>
      <path d="M 190.92 190.92 A 270 270 0 0 1 -190.92 190.92 L -65.05 65.05 A 92 92 0 0 0 65.05 65.05 Z" fill="#7fa07f"/>
      <path d="M -190.92 190.92 A 270 270 0 0 1 -190.92 -190.92 L -65.05 -65.05 A 92 92 0 0 0 -65.05 65.05 Z" fill="#b08fa0"/>
      <circle cx="0" cy="0" r="92" fill="#15151c"/>
    </g>
  </g>
</svg>
